// ─── GLOBAL GLOSSARY OPENER ───────────────────────────────────────────────────
let _openGlossary = null;
const registerGlossary = (fn) => { _openGlossary = fn; };

const GLOSSARY = {
  blank_bale:{ term:"Blank Bale", phonetic:"blangk bayl", origin:"🇬🇧 Anglais", def:"Exercice où l'on tire sur une cible très proche (1–2 m) sans viser, pour se concentrer uniquement sur la gestuelle. Idéal pour développer l'automatisme musculaire et casser la panique de cible." },
  scope:{ term:"Scope", phonetic:"skop", origin:"🇬🇧 Anglais", def:"Viseur circulaire à lentille grossissante monté sur l'arc à poulies de compétition. Il remplace le simple pin de visée et permet de voir le détail du blason à longue distance." },
  float_control:{ term:"Float Control", phonetic:"flot kontrole", origin:"🇬🇧 Anglais", def:"Travail sur l'acceptation du mouvement naturel du scope. Plutôt que de figer le viseur (ce qui crée de la tension), on laisse le scope flotter et on déclenche dans ce mouvement." },
  trispot:{ term:"Trispot", phonetic:"tri-spot", origin:"🇬🇧 Anglais", def:"Blason de compétition indoor comportant 3 zones de visée (triple face) en triangle. Utilisé à 18 m, il permet de tirer 3 flèches sur 3 cibles distinctes pour éviter d'endommager les flèches." },
  punch:{ term:"Punch", phonetic:"peunche", origin:"🇬🇧 Anglais", def:"Défaut technique : appui brusque et anticipé sur le décocheur avant la fin de l'expansion. Le cerveau 'commande' la décoche trop tôt. Cause principale de flèches basses et de groupements dispersés." },
  follow_through:{ term:"Follow-Through", phonetic:"folou-throo", origin:"🇬🇧 Anglais", def:"Continuation naturelle du mouvement après la décoche : la main de traction recule, le coude continue vers l'arrière, le bras d'arc avance. La flèche est encore sur la corde quand ce mouvement commence." },
  draw_weight:{ term:"Draw Weight", phonetic:"dro wayt", origin:"🇬🇧 Anglais", def:"Puissance de l'arc en livres (lbs). Sur un arc à poulies, après le pic, le poids chute grâce aux cames (let-off). Un arc de 60 lbs avec 80% de let-off ne demande plus que 12 lbs à tenir en visée." },
  tiller:{ term:"Tiller", phonetic:"tileur", origin:"🇬🇧 Anglais", def:"Distance en mm entre la base de chaque branche et la corde. Le tiller haut et bas doivent être identiques (Tiller A – Tiller B = 0) pour que les deux branches travaillent ensemble à l'armement et à la libération." },
  draw_length:{ term:"Draw Length / Allonge", phonetic:"dro lenght", origin:"🇬🇧 Anglais", def:"Distance en pouces entre l'ancrage et la poignée à pleine allonge. Réglée via les modules des poulies. La norme internationale correspond à la distance corde–pivot + 1¾ pouce." },
  cam_lean:{ term:"Cam Lean", phonetic:"kam lin", origin:"🇬🇧 Anglais", def:"Inclinaison latérale de la came par rapport à l'axe de l'arc. Se règle en vrillant le Yoke. Contrôle : plaquer une flèche contre le plat de la poulie, elle doit suivre parfaitement la corde." },
  yoke:{ term:"Yoke", phonetic:"yok", origin:"🇬🇧 Anglais", def:"Câble en Y reliant la corde à la poulie des deux côtés. En vrillant un brin du Yoke, on modifie l'inclinaison de la came pour aligner la corde avec l'axe de l'arc." },
  timing:{ term:"Timing / Synchro", phonetic:"tayming", origin:"🇬🇧 Anglais", def:"Synchronisation des deux poulies : elles doivent atteindre la butée câble au même moment. Poulie du haut en retard → torsader le buss cable. Poulie du bas en retard → torsader le control cable." },
  arrow_rest:{ term:"Arrow Rest / Repose-Flèche", phonetic:"arou reste", origin:"🇬🇧 Anglais", def:"Dispositif fixé sur la fenêtre de l'arc qui supporte la flèche. Hauteur : le centre de la flèche doit passer devant le trou de fixation. La norme d'inclinaison de la lamelle est à 45°." },
  center_shot:{ term:"Center Shot", phonetic:"senteur shot", origin:"🇬🇧 Anglais", def:"Réglage latéral du repose-flèche : distance en mm entre le centre de la flèche et l'axe de l'arc. La flèche doit être dans le plan de poussée de la corde (repérer le passage de la corde par rapport aux poulies)." },
  nocking_point:{ term:"Nocking Point / Encochage", phonetic:"noking point", origin:"🇬🇧 Anglais", def:"Repère(s) sur la corde pour positionner la flèche. Hauteur de référence : à l'équerre (0°) avec le repose-flèche. Le détalonnage doit être réglé à 0 par rapport au tube (pas à l'encoche)." },
  d_loop:{ term:"D-Loop", phonetic:"di-loop", origin:"🇬🇧 Anglais", def:"Petite boucle de cordelette nouée sur la corde, sur laquelle se fixe le décocheur. Elle centre l'effort, protège la corde et oriente correctement la visette à chaque armement. Longueur : 1,5 à 2 cm." },
  peep_sight:{ term:"Peep Sight / Visette", phonetic:"pip sayt", origin:"🇬🇧 Anglais", def:"Anneau serti dans la corde, aligné avec l'œil. 2 types : neutre ou correctrice. La taille du trou (ex : 3/16\") détermine la précision vs la luminosité. L'angle du support (45° ou 37,5°) s'adapte à l'allonge." },
  windage:{ term:"Windage / Latitude", phonetic:"windige", origin:"🇬🇧 Anglais", def:"Réglage latéral (gauche/droite) du viseur. Valeur positive = déplacement vers la droite. Joue sur la correction du torque résiduel et la dérive par le vent." },
  elevation:{ term:"Élévation / Longitude", phonetic:"elévaychon", origin:"🇬🇧 Anglais", def:"Réglage vertical (haut/bas) du viseur. Varie avec la distance : plus la distance augmente, plus le viseur descend. La verticalité est optimisée par le poids de la stabilisation." },
  ancrage:{ term:"Ancrage", phonetic:"", origin:"🇫🇷 Français technique", def:"Point de contact reproductible entre la main de traction et le visage à pleine allonge. Sur arc à poulies avec décocheur : généralement sous le maxillaire, corde au nez ou à la lèvre." },
  decocheur:{ term:"Décocheur", phonetic:"release aid", origin:"🇫🇷 Français", def:"Dispositif mécanique tenu en main (ou fixé au poignet) qui s'accroche au D-loop. Élimine le torque digital, améliore la régularité. Pour un meilleur scopage, affiner l'angle du support de visette selon l'allonge." },
  module:{ term:"Module (de poulie)", phonetic:"", origin:"🇫🇷 Français technique", def:"Pièce réglable fixée sur la came qui détermine l'allonge. Gradué en lettres ou en pouces. Travailler le plus proche possible de l'allonge maximale (mur plus franc, let-off plus confortable)." },
  hold_drill:{ term:"Hold Drill", phonetic:"old dril", origin:"🇬🇧 Anglais", def:"Exercice de maintien en pleine allonge pendant 5–8 secondes avant de déclencher. Développe la stabilité musculaire, force l'expansion dorsale, et entraîne le mental à ne pas précipiter la décoche." },
  let_off:{ term:"Let-Off", phonetic:"let-off", origin:"🇬🇧 Anglais", def:"Réduction de la puissance en fin d'armé grâce aux cames. La puissance recommandée au mur est entre 18 et 20 lbs. Let-off élevé (65-75%) = environ 15–17 lbs. Réglable via le tranche-fil du câble buss." },
  expansion_dorsale:{ term:"Expansion Dorsale", phonetic:"", origin:"🇫🇷 Français technique", def:"Mouvement continu des muscles du dos (rhomboïdes, trapèzes) qui tire l'omoplate vers la colonne après l'ancrage. C'est ce mouvement qui déclenche naturellement la décoche — pas l'action des doigts." },
  torque:{ term:"Torque", phonetic:"tork", origin:"🇬🇧 Anglais", def:"Rotation parasite transmise à la poignée. Si la main est trop crispée, la flèche dévie. La pression doit être uniquement dans le V du pouce. L'arc doit sauter droit vers l'avant après la décoche." },
  sight_mark:{ term:"Sight Mark", phonetic:"sayt mark", origin:"🇬🇧 Anglais", def:"Valeur de réglage du viseur (élévation + windage) pour une distance donnée. Ces marques évoluent avec la corde, la météo, les flèches. À recalibrer après chaque changement de matériel." },
  let_off2:{ term:"Mur", phonetic:"wall", origin:"🇫🇷 / 🇬🇧", def:"Point de fin d'armé où les cames arrivent en butée. Un bon mur est franc et net. La synchronisation des poulies et la longueur des câbles déterminent la qualité du mur." },
  test_papier:{ term:"Test Papier", phonetic:"paper test", origin:"🇫🇷 Français technique", def:"Test de vol de flèche : on tire à 2 m à travers une feuille de papier. La déchirure montre l'orientation de la flèche. Pointe et plumes au même endroit = bon vol. Permet d'affiner l'encochage et le center shot." },
  spine:{ term:"Spine (flèche)", phonetic:"spain", origin:"🇬🇧 Anglais", def:"Rigidité de la flèche. Pour un arc à poulies, choisir une flèche légèrement trop raide plutôt que trop souple. Longueur : couper au bord de la fenêtre de l'arc. Carbone = plus rapide, même sensation qu'en extérieur." },
};

function Term({ k, children }) {
  if (!GLOSSARY[k]) return <>{children}</>;
  return (
    <span style={{ display:"inline-flex", alignItems:"center", gap:"3px", cursor:"pointer" }}
      onClick={e => { e.stopPropagation(); _openGlossary?.(k); }}>
      <span style={{ borderBottom:"1px dotted #555", paddingBottom:"1px" }}>{children}</span>
      <span style={{ display:"inline-flex", alignItems:"center", justifyContent:"center", width:"14px", height:"14px", borderRadius:"50%", background:"rgba(249,115,22,0.15)", color:"#f97316", fontSize:"9px", fontWeight:"700", lineHeight:1, fontFamily:"'DM Sans',sans-serif" }}>ⓘ</span>
    </span>
  );
}

// ─── BOW SETTINGS PAGE ────────────────────────────────────────────────────────
function BowSettingsPage({ onFfta }) {
  const [openCard, setOpenCard] = useState(null);
  const [values, setValues] = useState({});
  const [saved, setSaved] = useState(false);

  const set=(cId,fId,v)=>{setValues(p=>({...p,[`${cId}_${fId}`]:v}));setSaved(false);};
  const get=(cId,fId)=>values[`${cId}_${fId}`]||"";
  const cardHasData=c=>c.fields.filter(f=>f.type!=="computed").some(f=>get(c.id,f.id).trim()!=="");

  return (
    <div className="settings-page">
      {saved&&<div className="settings-saved-bar">✓ Réglages sauvegardés</div>}
      {BOW_SETTINGS.map(card=>{
        const isOpen=openCard===card.id;
        const hasData=cardHasData(card);
        return (
          <div className={`bow-card ${hasData?"has-data":""}`} key={card.id}>
            <div className="bow-card-header" onClick={()=>setOpenCard(isOpen?null:card.id)}>
              <span className="bc-step">{card.step}</span>
              <span className="bc-icon">{card.icon}</span>
              <div className="bc-text"><div className="bc-title">{card.titleEl}</div><div className="bc-subtitle">{card.subtitle}</div></div>
              <div className="bc-status">{hasData?"✓":""}</div>
              {card.ffta&&<button className="bc-help-btn" onClick={e=>{e.stopPropagation();onFfta(card.ffta);}} title="Aide FFTA">?</button>}
              <span className={`bc-chevron ${isOpen?"open":""}`}>▼</span>
            </div>
            {isOpen&&(
              <div className="bow-card-body">
                <div className="tip-block"><span className="tip-icon">💡</span><span>{card.tip}</span></div>
                {card.fields.map(f=>(
                  <div className="field-group" key={f.id}>
                    <div className="field-label">{f.labelEl||f.label}</div>
                    {f.type==="computed"?(
                      <div className="field-computed"><span>{f.compute(Object.fromEntries(card.fields.map(ff=>[ff.id,get(card.id,ff.id)])))}</span><span className="field-computed-unit">{f.unit}</span></div>
                    ):f.type==="textarea"?(
                      <textarea className="field-textarea" placeholder={f.placeholder} value={get(card.id,f.id)} onChange={e=>set(card.id,f.id,e.target.value)} rows={2}/>
                    ):(
                      <div className="field-row">
                        <input className={`field-input ${f.unit?"with-unit":""}`} type={f.type==="number"?"number":"text"} placeholder={f.placeholder} value={get(card.id,f.id)} onChange={e=>set(card.id,f.id,e.target.value)} inputMode={f.type==="number"?"decimal":"text"}/>
                        {f.unit&&<span className="field-unit">{f.unit}</span>}
                      </div>
                    )}
                  </div>
                ))}
              </div>
            )}

        );
      })}
      <button style={{width:"100%",marginTop:8,padding:"14px",borderRadius:"12px",background:"#f97316",border:"none",color:"#fff",fontFamily:"'Bebas Neue',sans-serif",fontSize:"18px",letterSpacing:"0.1em",cursor:"pointer"}} onClick={()=>setSaved(true)}>
        SAUVEGARDER MES RÉGLAGES
      </button>
    </div>
  );
}

// ─── SIGHT MARKS PAGE ────────────────────────────────────────────────────────
const DEFAULT_DISTANCES=[10,15,18,20,25,30,40,50,60,70];
function SightMiniChart({rows,field,color}){
  const valid=rows.filter(r=>r[field]&&!isNaN(parseFloat(r[field])));
  if(valid.length<2)return null;
  const W=320,H=80,PAD={l:36,r:10,t:8,b:20};
  const iW=W-PAD.l-PAD.r,iH=H-PAD.t-PAD.b;
  const xs=valid.map(r=>parseFloat(r.dist)),ys=valid.map(r=>parseFloat(r[field]));
  const xMin=Math.min(...xs),xMax=Math.max(...xs),yMin=Math.min(...ys),yMax=Math.max(...ys),yRange=yMax-yMin||1;
  const px=x=>PAD.l+((x-xMin)/(xMax-xMin||1))*iW;
  const py=y=>PAD.t+iH-((y-yMin)/yRange)*iH;
  const points=valid.map(r=>`${px(parseFloat(r.dist))},${py(parseFloat(r[field]))}`).join(" ");
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:H,overflow:"visible"}}>
      {[0,0.5,1].map(t=>{const y=PAD.t+t*iH;return(<g key={t}><line x1={PAD.l} y1={y} x2={W-PAD.r} y2={y} stroke="#1e1e1e" strokeWidth="1"/><text x={PAD.l-4} y={y+3} textAnchor="end" fill="#444" fontSize="9">{(yMax-t*yRange).toFixed(1)}</text></g>);})}
      {valid.map(r=>(<text key={r.id} x={px(parseFloat(r.dist))} y={H-4} textAnchor="middle" fill="#444" fontSize="9">{r.dist}m</text>))}
      <polyline points={points} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round"/>
      {valid.map(r=>(<circle key={r.id} cx={px(parseFloat(r.dist))} cy={py(parseFloat(r[field]))} r="3" fill={color}/>))}
    </svg>
  );
}
function SightMarksPage(){
  const [rows,setRows]=useState(DEFAULT_DISTANCES.map(d=>({id:d,dist:String(d),elev:"",wind:"",notes:""})));
  const [saved,setSaved]=useState(false);
  const [editingId,setEditingId]=useState(null);
  const [newDist,setNewDist]=useState("");
  const update=(id,f,v)=>{setRows(p=>p.map(r=>r.id===id?{...r,[f]:v}:r));setSaved(false);};
  const addRow=()=>{const d=newDist.trim();if(!d)return;const id=Date.now();setRows(p=>[...p,{id,dist:d,elev:"",wind:"",notes:""}].sort((a,b)=>parseFloat(a.dist)-parseFloat(b.dist)));setNewDist("");};
  const removeRow=id=>{setRows(p=>p.filter(r=>r.id!==id));setSaved(false);};
  const filledRows=rows.filter(r=>r.elev||r.wind);
  return(
    <div className="sight-page">
      {saved&&<div className="settings-saved-bar">✓ Réglages viseur sauvegardés</div>}
      <div className="sight-legend">
        <div className="sl-item"><span className="sl-dot" style={{background:"#38bdf8"}}/><span className="sl-text"><b><Term k="elevation">Longitude</Term></b> = Élévation (haut / bas)</span></div>
        <div className="sl-item"><span className="sl-dot" style={{background:"#f97316"}}/><span className="sl-text"><b><Term k="windage">Latitude</Term></b> = Windage (gauche / droite)</span></div>
        <div className="sl-sub">Valeurs positives = vers le haut / droite. Cliquer sur une ligne pour éditer.</div>
      </div>
      <div className="sight-table-wrap">
        <div className="sight-table-head">
          <span className="st-dist">Dist.</span>
          <span className="st-val blue"><Term k="elevation">Long.</Term><br/><small>Élév.</small></span>
          <span className="st-val orange"><Term k="windage">Lat.</Term><br/><small>Wind.</small></span>
          <span className="st-notes">Notes</span>
          <span className="st-del"/>
        </div>
        {rows.map(row=>{
          const isEditing=editingId===row.id,hasFull=row.elev||row.wind;
          return(
            <div key={row.id} className={`sight-row ${hasFull?"filled":""} ${isEditing?"editing":""}`} onClick={()=>!isEditing&&setEditingId(row.id)}>
              <div className="st-dist">{isEditing?(<input className="st-input dist-input" value={row.dist} onChange={e=>update(row.id,"dist",e.target.value)} inputMode="decimal"/>):(<span className="dist-badge">{row.dist}<small>m</small></span>)}</div>
              <div className="st-val blue">{isEditing?(<input className="st-input" placeholder="0.0" value={row.elev} onChange={e=>update(row.id,"elev",e.target.value)} inputMode="decimal" autoFocus/>):(<span className={`val-chip blue ${row.elev?"set":""}`}>{row.elev||"–"}</span>)}</div>
              <div className="st-val orange">{isEditing?(<input className="st-input" placeholder="0.0" value={row.wind} onChange={e=>update(row.id,"wind",e.target.value)} inputMode="decimal"/>):(<span className={`val-chip orange ${row.wind?"set":""}`}>{row.wind||"–"}</span>)}</div>
              <div className="st-notes">{isEditing?(<input className="st-input notes-input" placeholder="ex : intérieur…" value={row.notes} onChange={e=>update(row.id,"notes",e.target.value)}/>):(<span className="notes-text">{row.notes}</span>)}</div>
              <div className="st-del">{isEditing?(<button className="done-btn" onClick={e=>{e.stopPropagation();setEditingId(null);}}>✓</button>):(<button className="del-btn" onClick={e=>{e.stopPropagation();removeRow(row.id);}}>✕</button>)}</div>
            </div>
          );
        })}
      </div>
      <div className="add-dist-row">
        <input className="add-dist-input" placeholder="Ajouter une distance (m)" value={newDist} onChange={e=>setNewDist(e.target.value)} inputMode="decimal" onKeyDown={e=>e.key==="Enter"&&addRow()}/>
        <button className="add-dist-btn" onClick={addRow}>+</button>
      </div>
      {filledRows.length>=2&&(<div className="sight-chart-wrap">
        <div className="sc-title"><span className="sc-title-dot blue"/>Courbe élévation</div>
        <SightMiniChart rows={filledRows} field="elev" color="#38bdf8"/>
        {filledRows.some(r=>r.wind)&&(<><div className="sc-title" style={{marginTop:16}}><span className="sc-title-dot orange"/>Courbe windage</div><SightMiniChart rows={filledRows} field="wind" color="#f97316"/></>)}
      </div>)}
      <button style={{width:"100%",marginTop:20,padding:"14px",borderRadius:"12px",background:"#38bdf8",border:"none",color:"#0a0a0a",fontFamily:"'Bebas Neue',sans-serif",fontSize:"18px",letterSpacing:"0.1em",cursor:"pointer"}} onClick={()=>setSaved(true)}>SAUVEGARDER</button>
    </div>
  );
}

        {techSheet&&(
          <div className="modal-overlay" onClick={closeAll}>
            <div className="modal" onClick={e=>e.stopPropagation()}>
              <div className="modal-handle"/>
              <span className="modal-icon">{techSheet.icon}</span>
              <div className="modal-title">{techSheet.title}</div>
              <div className="modal-tagline">"{techSheet.tagline}"</div>
              <div className="modal-section"><div className="modal-section-header"><span className="msh-label good">✓ Signes que c'est BON</span></div><div className="modal-items">{techSheet.good.map((g,i)=><div className="modal-item" key={i}><span className="mi-dot good"/>{g}</div>)}</div></div>
              <div className="modal-section"><div className="modal-section-header"><span className="msh-label bad">✗ Signes que c'est MAUVAIS</span></div><div className="modal-items">{techSheet.bad.map((b,i)=><div className="modal-item" key={i}><span className="mi-dot bad"/>{b}</div>)}</div></div>
              <button className="modal-close" onClick={closeAll}>Fermer</button>
            </div>
          </div>
        )}

        {/* GLOSSARY MODAL */}
        {glossaryEntry&&(
          <div className="modal-overlay" onClick={closeAll}>
            <div className="glos-modal" onClick={e=>e.stopPropagation()}>
              <div className="modal-handle"/>
              <div className="glos-origin">{glossaryEntry.origin}</div>
              <div className="glos-term">{glossaryEntry.term}</div>
              {glossaryEntry.phonetic&&<div className="glos-phonetic">/{glossaryEntry.phonetic}/</div>}
              <div className="glos-accent-bar"/>
              <div className="glos-def">{glossaryEntry.def}</div>
              <button className="modal-close" style={{marginTop:20}} onClick={closeAll}>Fermer</button>
            </div>
          </div>
        )}

        {/* FFTA HELP MODAL */}
        {fftaData&&(
          <div className="modal-overlay" onClick={closeAll}>
            <div className="ffta-modal" onClick={e=>e.stopPropagation()}>
              <div className="modal-handle"/>
              <div className="ffta-badge">GUIDE FFTA — ARC À POULIES</div>
              <div className="ffta-title">{fftaData.title}</div>
              <div className="ffta-accent"/>
              {fftaData.sections.map((s,i)=>(
                <div className="ffta-section" key={i}>
                  <div className="ffta-heading">{s.heading}</div>
                  <div className="ffta-body">{s.body}</div>
                </div>
              ))}
              <button className="modal-close" onClick={closeAll}>Fermer</button>
            </div>
          </div>
        )}
      </div>
    </>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
